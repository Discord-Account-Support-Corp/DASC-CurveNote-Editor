<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Copilot Studio Community</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0078D7" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f7f7f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
      text-align: center;
    }

    .btn {
      padding: 16px 32px;
      font-size: 1.2em;
      background: #0078D7;
      color: white;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .hint {
      margin-top: 15px;
      font-size: 0.9em;
      color: #555;
    }

    .loading {
      display: none;
      margin-top: 15px;
      font-size: 0.9em;
      color: #0078D7;
    }
  </style>
</head>

<body>

  <button class="btn" id="enterBtn">
    Enter Curvenote Editor
  </button>

  <div class="loading" id="loading">
    Launching editor...
  </div>

  <div class="hint">
    Faster launch mode enabled (no reload shell)
  </div>

  <script>
    const btn = document.getElementById("enterBtn");
    const loading = document.getElementById("loading");

    btn.addEventListener("click", () => {
      loading.style.display = "block";
      btn.disabled = true;

      // slight delay for UX feel (not actual loading)
      setTimeout(() => {
        window.location.href = "https://editor.curvenote.com/@uhlukas";
      }, 300);
    });
  </script>

</body>
</html>
