<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Curvenote Editor</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, sans-serif;
      background: #f7f7f7;

      /* kills “Safari bounce feel” */
      overscroll-behavior: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .screen {
      transition: all 0.35s ease;
    }

    .title {
      font-size: 1.4em;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .btn {
      padding: 16px 32px;
      font-size: 1.1em;
      background: #0078D7;
      color: white;
      border-radius: 14px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .fade-out {
      opacity: 0;
      transform: scale(0.98);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: #f7f7f7;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .overlay.active {
      opacity: 1;
    }
  </style>
</head>

<body>

  <div class="overlay" id="overlay"></div>

  <div class="screen" id="screen">
    <div class="title">Copilot Studio Community</div>

    <button class="btn" id="enter">
      Enter Curvenote Editor
    </button>
  </div>

  <script>
    const btn = document.getElementById("enter");
    const screen = document.getElementById("screen");
    const overlay = document.getElementById("overlay");

    btn.addEventListener("click", () => {
      overlay.classList.add("active");
      screen.classList.add("fade-out");

      setTimeout(() => {
        window.location.href = "https://editor.curvenote.com/@uhlukas";
      }, 300);
    });
  </script>

</body>
</html>
